seed: 0
output_dir: './output/' # path to save checkpoint/strategy
#load_checkpoint: './output/checkpoint'    # modify, ''
load_checkpoint: ''
remove_redundancy: False
#load_checkpoint: './output/checkpoint'    # modify, ''
load_ckpt_format: 'safetensors'
src_strategy_path_or_dir: ''
auto_trans_ckpt: False  # If true, auto transform load_checkpoint to load in distributed model
only_save_strategy: False
resume_training: False
resume_by_last_timestamp_ckpt: False
use_parallel: True
run_mode: 'train'

# trainer config
trainer:
  type: CausalLanguageModelingTrainer
  model_name: 'deepseekV3'

# runner config
runner_config:
  epochs: 100    # modify, 2
  batch_size: 1
  sink_mode: True
  sink_size: 1    # modify, 2

# optimizer
optimizer:
  type: AdamW
  betas: [0.9, 0.95]
  eps: 1.e-8
  learning_rate: 2.4e-4 #3.e-4
  weight_decay: 0.1

# lr schedule
lr_schedule:
  type: CosineWithWarmUpLR
  learning_rate: 2.e-5 #2.e-5
  lr_end: 2.e-5 # 2.e-5
  warmup_lr_init: 0
  warmup_steps: 200
  total_steps: -1 # -1 means it will load the total steps of the dataset

# dataset
train_dataset: &train_dataset
  data_loader:
    type: BlendedMegatronDatasetDataLoader
    datasets_type: "GPTDataset"
    sizes:
      - 250000 # train dataset size
      - 0
      - 0
    config:
      random_seed: 1234
      seq_length: 4096
      split: "1, 0, 0"
      reset_position_ids: False
      reset_attention_mask: False
      eod_mask_loss: False
      num_dataset_builder_threads: 1
      create_attention_mask: False
      data_path:
        - '1'
        - "/home/ma-user/modelarts/user-job-dir/workspace/mindformers_0328/wiki_4096_text_document/wiki_4096_text_document"
    shuffle: False
  input_columns: ["input_ids", "labels", "loss_mask", "position_ids"]
  construct_args_key: ["input_ids", "labels"]
  num_parallel_workers: 8
  python_multiprocessing: False
  drop_remainder: True
  repeat: 1
  numa_enable: False
  prefetch_size: 1
train_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *train_dataset
# if True, do evaluate during the training process. if false, do nothing.
# note that the task trainer should support _evaluate_in_training function.
do_eval: False
eval_step_interval: -1        # num of step intervals between each eval, -1 means no step end eval.
eval_epoch_interval: 50        # num of epoch intervals between each eval, 1 means eval on every epoch end.

# mindspore context init config
context:
  mode: 0 #0--Graph Mode; 1--Pynative Mode
  device_target: "Ascend"
  max_call_depth: 10000
  max_device_memory: "55GB"    # modify, "59GB"
  memory_optimize_level: "O0"    # add
  save_graphs: True
  save_graphs_path: "./graph"
  # deterministic: "ON"
  jit_config:
    jit_level: "O1"
  ascend_config:    # add
    parallel_speed_up_json_path: "/home/ma-user/modelarts/user-job-dir/workspace/mindformers_0328/parallel_speed_up.json"    # add
  mempool_block_size: "55GB"

# default parallel of device num = 16 for Atlas 800
parallel_config:
  data_parallel: &dp 32    # modify, 4
  model_parallel: 1    # modify, 8
  pipeline_stage: 8 # 16    # modify, 2
  expert_parallel: 32    # modify, 4
  micro_batch_num: &micro_batch_num 16    # modify, 20
  vocab_emb_dp: True
  use_seq_parallel: True    # modify, False
  gradient_aggregation_group: 4
# when model parallel is greater than 1, we can set micro_batch_interleave_num=2, that may accelerate the train process.
micro_batch_interleave_num: 1

# parallel context config
parallel:
  parallel_mode: 1 # 0-data parallel, 1-semi-auto parallel, 2-auto parallel, 3-hybrid parallel
  gradients_mean: False
  enable_alltoall: True
  #full_batch: True
  full_batch: False    # modify, True
  dataset_strategy: [[*dp, 1], [*dp, 1], [*dp, 1], [*dp, 1]] #[[64, 1], [64, 1]]    # add, =dp
  search_mode: "sharding_propagation"
  enable_parallel_optimizer: True
  strategy_ckpt_save_file: "./ckpt_strategy.ckpt"
  pipeline_config:
      pipeline_interleave: False
      pipeline_scheduler: seqpipe
  parallel_optimizer_config:
    gradient_accumulation_shard: False
    parallel_optimizer_threshold: 64
    # optimizer_weight_shard_size: 2    # add


# recompute config
recompute_config:
  # recompute: [[3, 2, 2, 2], [2, 2, 2, 0]]
  # recompute: [3, 2, 2, 2, 2, 2, 2, 0]
  recompute: [1, 1, 0, 0, 0, 0, 0, 0]
  select_recompute: False
  parallel_optimizer_comm_recompute: True
  mp_comm_recompute: True
  recompute_slice_activation: True

# model config
model:
  model_config:
    type: DeepseekV3Config
    pp_interleave_num: 1 #2
    auto_register: deepseek3_config.DeepseekV3Config
    batch_size: 1 # add for increase predict
    seq_length: 4096 #8192    # modify, 4096
    hidden_size: 7168    # modify, 5120
    num_layers: &num_layers 15 #60    # modify, 60
    num_heads: 128
    max_position_embeddings: 8192
    intermediate_size: 18432
    kv_lora_rank: 512
    q_lora_rank: 1536
    qk_rope_head_dim: 64
    v_head_dim: 128
    qk_nope_head_dim: 128
    vocab_size: 129280 # 159744 # 152064
    multiple_of: 256
    rms_norm_eps: 1.0e-6
    bos_token_id: 100000
    eos_token_id: 100001
    pad_token_id: 100001
    #bos_token_id: 1
    #eos_token_id: 2
    #pad_token_id: -1
    #eod_reset: True #eod
    #eod_token_id: [159251, 159252]
    ignore_token_id: -100
    compute_dtype: "bfloat16"
    layernorm_compute_type: "float32"
    softmax_compute_type: "float32"
    rotary_dtype: "float32"
    router_dense_type: "float32"
    param_init_type: "float32" #"bfloat16"
    use_past: False
    extend_method: "None"
    use_flash_attention: True    # modify, False
    input_sliced_sig: True
    # offset: [[1, 0, 0, 0], [0, 0, 0, -1]]   # modify, 0
    #offset:  [1,0,0,0,0,0,0,-1]
    #offset: [0,0,0,1,1,1,1,0]
    offset:  [0,0,0,0,0,0,0,0] # ppb: [2,0,0,1,1,0,0,-1]
    checkpoint_name_or_path: ""
    repetition_penalty: 1
    max_decode_length: 1024
    top_k: 5
    top_p: 1
    theta: 10000.0
    do_sample: False
    return_extra_loss: True
    mtp_depth: &mtp_depth 1
    mtp_loss_factor: 0.3
    use_fused_rope: True
    use_fused_swiglu: True
  arch:
    type: DeepseekV3ForCausalLM
    auto_register: deepseek3.DeepseekV3ForCausalLM

moe_config:
  expert_num: &expert_num 256
  expert_model_parallel: 1    # add
  expert_group_size: 8
  capacity_factor: 1.5 #1.0    # modify, 2.0
  aux_loss_factor: 0.05
  num_experts_chosen: 8
  #topk_method: "group_limited_greedy"
  routing_policy: "TopkRouterV2"
  enable_sdrop: False # True
  balance_via_topk_bias: &balance_via_topk_bias True
  topk_bias_update_rate: &topk_bias_update_rate 0.0001
  use_fused_ops_topkrouter: True
  shared_expert_num: 1
  routed_scaling_factor: 2.5 #16.0
  norm_topk_prob: False
  first_k_dense_replace: 3 # 1 #1
  moe_intermediate_size: 2048
  # greedy_group_limited strategy, select topk_group from n_group
  topk_group: 4
  n_group: 8
  aux_loss_factors: [0.1]
  aux_loss_types: ["expert"]
  z_loss_factor: 0.0
  use_gating_sigmoid: True
  use_gmm: True
  enable_gmm_safe_tokens: False
  enable_deredundency: True
  npu_nums_per_device: 8

processor:
  return_tensors: ms
  tokenizer:
    unk_token: '<unk>'
    bos_token: '<｜begin▁of▁sentence｜>'
    eos_token: '<｜end▁of▁sentence｜>'
    pad_token: '<｜end▁of▁sentence｜>'
    type: LlamaTokenizerFast
    vocab_file: './path/tokenizer.model'
    tokenizer_file: './path/tokenizer.json'
  type: LlamaProcessor

# metric
metric:
  type: PerplexityMetric

# wrapper cell config
runner_wrapper:
  type: MFTrainOneStepCell
  scale_sense: 1.0
  use_clip_grad: True

eval_callbacks:
  - type: ObsMonitor

callbacks:
  - type: MFLossMonitor
    per_print_times: 1
  - type: TopkBiasBalanceCallback
    balance_via_topk_bias: *balance_via_topk_bias
    topk_bias_update_rate: *topk_bias_update_rate
    num_layers: *num_layers
    mtp_depth: *mtp_depth
    expert_num: *expert_num
    micro_batch_num: *micro_batch_num
  # - type: CheckpointMonitor
  #   prefix: "deepseekv3"
  #   save_checkpoint_steps: 1000
  #   keep_checkpoint_max: 2
  #   integrated_save: False
  #   async_save: False
  #   checkpoint_format: safetensors
  #   remove_redundancy: False
 # - type: ObsMonitor

auto_tune: False
filepath_prefix: './autotune'
autotune_per_step: 10

profile: True
profile_start_step: 10    # modify, 1
profile_stop_step: 10
init_start_profile: False
profile_communication: False
profile_memory: True
layer_scale: False
layer_decay: 0.65
lr_scale_factor: 256
profile_level: 1

# aicc
remote_save_url: "Please input obs url on AICC platform."
