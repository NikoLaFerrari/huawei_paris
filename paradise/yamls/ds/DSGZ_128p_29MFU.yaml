seed: 0
output_dir: './output' # path to save checkpoint/strategy
load_checkpoint: ''
src_strategy_path_or_dir: ''
auto_trans_ckpt: False  # If true, auto transform load_checkpoint to load in distributed model
only_save_strategy: False
resume_training: False
use_parallel: True
run_mode: 'train'

# trainer config
trainer:
  type: CausalLanguageModelingTrainer
  model_name: 'deepseekV3'

# runner config
runner_config:
  epochs: 1 #2
  batch_size: 1
  sink_mode: True
  sink_size: 1

# optimizer
optimizer:
  type: AdamW
  betas: [0.9, 0.95]
  eps: 1.e-8
  learning_rate: 0 #3.e-4

# lr schedule
lr_schedule:
  type: CosineWithWarmUpLR
  learning_rate: 2.e-5
  lr_end: 2.e-5
  warmup_ratio: 0.0
  total_steps: -1 # -1 means it will load the total steps of the dataset

# dataset
train_dataset: &train_dataset
  data_loader:
    type: MindDataset
    dataset_dir: "/home/w00910067/wikitext/wiki4096.mindrecord"
    shuffle: False
  input_columns: ["input_ids"]  # "input_ids" , labels are used in instruction finetune.
  num_parallel_workers: 8
  python_multiprocessing: False
  drop_remainder: True
  repeat: 1
  numa_enable: False
  prefetch_size: 1
train_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *train_dataset
# if True, do evaluate during the training process. if false, do nothing.
# note that the task trainer should support _evaluate_in_training function.
do_eval: False
eval_step_interval: -1        # num of step intervals between each eval, -1 means no step end eval.
eval_epoch_interval: 50        # num of epoch intervals between each eval, 1 means eval on every epoch end.

# eval dataset
eval_dataset: &eval_dataset
  data_loader:
    type: MindDataset
    dataset_dir: ""
    shuffle: False
  input_columns: ["input_ids"]
  num_parallel_workers: 8
  python_multiprocessing: False
  drop_remainder: False
  repeat: 1
  numa_enable: False
  prefetch_size: 1
eval_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *eval_dataset

# mindspore context init config
context:
  mode: 0 #0--Graph Mode; 1--Pynative Mode
  device_target: "Ascend"
  max_call_depth: 10000
  max_device_memory: "54GB" # "54GB"
  save_graphs:  False
  save_graphs_path: "./graph"
  graph_kernel_flags: "--enable_pass=grouped_matmul_assignadd_fusion --enable_cluster_ops=MatMul,BatchMatMul,Reshape --online_tuning=1"
  ascend_config:    # add
    parallel_speed_up_json_path: "/data3/s50047805/gp_mf_dp_no_tnd/research/deepseek3/parallel_speed_up_vpp.json"
  enable_interleave_parallel_branch: True
  jit_config:
    jit_level: "O1"

# parallel context config
parallel:
  parallel_mode: 1 # 0-data parallel, 1-semi-auto parallel, 2-auto parallel, 3-hybrid parallel
  gradients_mean: False
  enable_alltoall: True
  full_batch: True
  search_mode: "sharding_propagation"
  enable_parallel_optimizer: True
  strategy_ckpt_save_file: "./ckpt_strategy.ckpt"
  pipeline_config:
    pipeline_interleave: True
    pipeline_scheduler: 'zero_bubble_v'
  parallel_optimizer_config:
    gradient_accumulation_shard: False
    parallel_optimizer_threshold: 64
    # optimizer_weight_shard_size: 16

# default parallel of device num = 16 for Atlas 800
parallel_config:
  data_parallel: 32
  model_parallel: 2
  pipeline_stage: 2
  expert_parallel: 64
  micro_batch_num: 60
  vocab_emb_dp: True
  use_seq_parallel: True
  gradient_aggregation_group: 4
# when model parallel is greater than 1, we can set micro_batch_inter4 #leave_num=2, that may accelerate the train process.
micro_batch_interleave_num: 1

# recompute config
recompute_config:
  recompute: True # False
  select_recompute: False
  parallel_optimizer_comm_recompute: False
  mp_comm_recompute: False
  recompute_slice_activation: False

# model config
model:
  model_config:
    type: DeepseekV3Config
    auto_register: deepseek3_config.DeepseekV3Config
    batch_size: 1 # add for increase predict
    pp_interleave_num: 2
    seq_length: 4096
    hidden_size: 7168
    num_layers: &num_layers 15
    num_heads: 128
    max_position_embeddings: 163840 #8192
    intermediate_size: 18432
    kv_lora_rank: 512
    n_kv_heads: 128
    q_lora_rank: 1536
    qk_rope_head_dim: 64
    v_head_dim: 128
    qk_nope_head_dim: 128
    vocab_size: 129280
    multiple_of: 256
    rms_norm_eps: 1.0e-6
    bos_token_id: 100000
    eos_token_id: 100001
    pad_token_id: 100001
    ignore_token_id: -100
    compute_dtype: "bfloat16"
    layernorm_compute_type: "float32"
    softmax_compute_type: "float32"
    rotary_dtype: "float32"
    router_dense_type: "float32"
    param_init_type: "float32"
    use_past: False
    extend_method: "None"
    use_flash_attention: True
    offset: [[0,0,0,0],[0,0,0,0]]
    checkpoint_name_or_path: ""
    repetition_penalty: 1
    max_decode_length: 1024
    top_k: 5
    top_p: 1
    theta: 10000.0
    do_sample: False
    return_extra_loss: False
    mtp_depth: &mtp_depth 1
    mtp_loss_factor: 0.3
    use_force_expert_balance: True
  arch:
    type: DeepseekV3ForCausalLM
    auto_register: deepseek3_model.DeepseekV3ForCausalLM

#moe
moe_config:
  #enable_deredundency: True
  #npu_nums_per_device: 16
  moe_shared_expert_overlap: True
  expert_num: &expert_num 256
  expert_group_size: 8
  capacity_factor: 1.0
  aux_loss_factor: 0.05
  num_experts_chosen: 8
  # topk_method: "group_limited_greedy"
  routing_policy: "TopkRouterV2"
  enable_sdrop: False
  balance_via_topk_bias: &balance_via_topk_bias False
  topk_bias_update_rate: &topk_bias_update_rate 0.0001
  use_fused_ops_topkrouter: True
  group_wise_a2a: False
  shared_expert_num: 1
  routed_scaling_factor: 2.5
  norm_topk_prob: True #pta是True
  first_k_dense_replace: 3 #2
  moe_intermediate_size: 2048
  # greedy_group_limited strategy, select topk_group from n_group
  topk_group: 4
  n_group: 8
  aux_loss_factors: [0.001, 0., 0.]
  aux_loss_types: ["expert", "device", "comm"]
  z_loss_factor: 0.0
  expert_model_parallel: 1
  use_gmm: True #True
  use_gating_sigmoid: False
  enable_gmm_safe_tokens: False #True

processor:
  return_tensors: ms
  tokenizer:
    unk_token: '<unk>'
    bos_token: '<｜begin▁of▁sentence｜>'
    eos_token: '<｜end▁of▁sentence｜>'
    pad_token: '<｜end▁of▁sentence｜>'
    type: LlamaTokenizerFast
    vocab_file: './path/tokenizer.model'
    tokenizer_file: './path/tokenizer.json'
  type: LlamaProcessor


# callbacks
callbacks:
  - type: MFLossMonitor
    per_print_times: 1
  - type: ObsMonitor

# metric
metric:
  type: PerplexityMetric

# wrapper cell config
runner_wrapper:
  type: MFTrainOneStepCell
  scale_sense: 1.0
  use_clip_grad: True

eval_callbacks:
  - type: ObsMonitor

auto_tune: False
filepath_prefix: './autotune'
autotune_per_step: 10

profile: True
profile_start_step: 10
profile_stop_step: 11
init_start_profile: False
profile_communication: False
profile_memory: True
layer_scale: False
layer_decay: 0.65
lr_scale_factor: 256

# aicc
remote_save_url: "Please input obs url on AICC platform."