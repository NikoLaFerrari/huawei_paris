seed: 0
output_dir: '/job/output' # path to save checkpoint/strategy
load_checkpoint: ''
#load_checkpoint: '/job/output/checkpoint'
#load_checkpoint: '/job/resume_ckpt'
resume_training: False #True #'cm_230b_rank_0-5000_1.safetensors' #True #False
auto_trans_ckpt: False #True #False  # If true, auto transform load_checkpoint to load in distributed model
load_ckpt_format: 'safetensors'
remove_redundancy: True
only_save_strategy: False 
run_mode: 'train'
check_for_nan_in_loss_and_grad: True

# trainer config
trainer:
  type: CausalLanguageModelingTrainer
  model_name: 'cm_230b'

# if True, do evaluate during the training process. if false, do nothing.
# note that the task trainer should support _evaluate_in_training function.
do_eval: False
eval_step_interval: -1        # num of step intervals between each eval, -1 means no step end eval.
eval_epoch_interval: 50        # num of epoch intervals between each eval, 1 means eval on every epoch end.

# runner config
runner_config:
  epochs: 1
  batch_size: 1
  sink_mode: True
  sink_size: 1

# wrapper cell config
runner_wrapper:
  type: MFTrainOneStepCell
  use_clip_grad: True
  scale_sense: 1

# optimizer
optimizer:
  type: AdamW
  betas: [0.9, 0.95]
  eps: 1.e-8
  learning_rate: 2.4e-4
  weight_decay: 0.1

# lr schedule
lr_schedule:
  type: CosineWithWarmUpLR
  learning_rate: 2.4e-4
  lr_end: 2.4e-4
  warmup_lr_init: 0
  warmup_steps: 2000
  total_steps: -1 # -1 means it will load the total steps of the dataset

# dataset
