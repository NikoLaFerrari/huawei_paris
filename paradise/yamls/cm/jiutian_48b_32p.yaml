  input_columns: ["input_ids"]  # "input_ids", "labels" , labels are used in instruction finetune.
  output_columns: ["input_ids"]
  #output_columns: ["input_ids", "position_ids", "attention_mask"]
  #construct_args_key: ["input_ids","position_ids", "attention_mask"]
  eod_reset: False #True
  #eod_token_id: [159251, 159252]
  num_parallel_workers: 8
  python_multiprocessing: False
  drop_remainder: True
  batch_size: 4
  repeat: 1
  numa_enable: False
  prefetch_size: 1
train_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *train_dataset


use_parallel: True
# parallel context config
parallel:
  parallel_mode: 1 # 0-data parallel, 1-semi-auto parallel, 2-auto parallel, 3-hybrid parallel
  gradients_mean: False
  enable_alltoall: True 
  full_batch: False 
  dataset_strategy: [[64, 1]] #[[64, 1], [64, 1]]    # add, =dp
  search_mode: "sharding_propagation"
  enable_parallel_optimizer: True
  strategy_ckpt_save_file: "./ckpt_strategy.ckpt"
  parallel_optimizer_config:
    gradient_accumulation_shard: False
    parallel_optimizer_threshold: 64
    optimizer_weight_shard_size: 8
  dump_device_local_norm: True

# default parallel of device num = 8 for Atlas 800T A2
parallel_config:
  data_parallel: 1
  model_parallel: 4
  pipeline_stage: 8
  expert_parallel: 4
  use_seq_parallel: True
  #optimizer_shard: True  # optimizer_shard == enable_parallel_optimizer
  micro_batch_num: &micro_batch_num 12 #144 #96 #48 #32 2304
  vocab_emb_dp: True
  gradient_aggregation_group: 8
# The size of micro_batch must be greater than or equal to stage_num(pipeline_stage).
# when model parallel is greater than 1, we can set micro_batch_interleave_num=2, that may accelerate the train process.
micro_batch_interleave_num: 1

# recompute config
recompute_config:
  recompute: True
  select_recompute: False
  parallel_optimizer_comm_recompute: False
  mp_comm_recompute: False
  recompute_slice_activation: False

# mindspore context init config
context:
  jit_config:
    jit_level: "O1"
  memory_optimize_level: "O0" #"O0"
  mode: 0 #0--Graph Mode; 1--Pynative Mode
  device_target: "Ascend"
  max_call_depth: 10000
  max_device_memory: "56GB"
  mempool_block_size: "54GB"
  #ascend_config:
  #  parallel_speed_up_json_path: "/job/code/parallel_speed_up_dropless_4096p.json"
  #graph_kernel_flags: "--opt_level=2 --enable_cluster_ops=MatMul,BatchMatMul,Reshape --online_tuning=1"
  save_graphs: True 
  save_graphs_path: "/job/output/graph"
  device_id: 0

# model config
model:
  model_config:
    type: LlamaConfig
    #auto_register: jiutian_config.JiuTianConfig
    batch_size: 1
    seq_length: 4096
    hidden_size: 5120
    num_layers: &num_layers 14
    num_heads: 64
    n_kv_heads: 8
    vocab_size: 152064
    #intermediate_size: 12288
    #qkv_has_bias: True
    rms_norm_eps: 1.0e-6
    theta: 10000.0
    max_position_embedding: 131072
    #emb_dropout_prob: 0.0
    #eos_token_id: 151643
   # pad_token_id: 151643
    compute_dtype: "bfloat16"
    layernorm_compute_type: "float32" #"bfloat16"
    residual_dtype: "float32"
    softmax_compute_type: "float32" #"bfloat16"
    rotary_dtype: "float32"
    param_init_type: "float32"
    router_dense_type: "float32"
    use_flash_attention: True
    use_past: False
    #fine_grain_interleave: 1
    #offset: [2,0,0,0,0,0,0] # 
    # offset: [0,0,1,1]
    offset: [0,0,1,1, 1,1,1,1]
    checkpoint_name_or_path: ""    
    is_dynamic: False
    qkv_concat: False #True
    init_method_std: 0.02
    return_extra_loss: True
    #mtp_depth: &mtp_depth 1
    #mtp_loss_factor: 0.3

  arch:
    type: LlamaForCausalLM

moe_config:
  expert_model_parallel: 1    # add
  moe_intermediate_size: 1728 #1536 #1728 #3456
  expert_num: &expert_num 128 #160 #128 #64
  num_experts_chosen: 8 #16 #8
  #shared_expert_num: 2
  capacity_factor: &capacity_factor 1.5
  routing_policy: 'TopkRouterV2'
  enable_sdrop: False
  use_fused_ops_topkrouter: True
  balance_via_topk_bias: &balance_via_topk_bias False
  topk_bias_update_rate: &topk_bias_update_rate 0.001
  first_k_dense_replace: 0
  aux_loss_factors: [0.01] #[0.001]
  aux_loss_types: ["expert"]
  #routed_scaling_factor: 2.5 #
  #use_gating_sigmoid: True
  norm_topk_prob: True 
  #comp_comm_parallel: True
  #comp_comm_parallel_degree: 2
  callback_moe_droprate: True
  use_gmm: False
  #use_gmm: True
  #enable_gmm_safe_tokens: True
  

# callbacks
callbacks:
  - type: MFLossMonitor
    per_print_times: 10
  - type: CheckpointMonitor
    prefix: "cm_230b"
    save_checkpoint_steps: 200
    keep_checkpoint_max: 100
    save_network_params: False
    integrated_save: False
    async_save: False
    checkpoint_format: safetensors
    remove_redundancy: True
  - type: ObsMonitor
  - type: MoEDropRateCallback
    expert_num: *expert_num
    capacity_factor: *capacity_factor
    mtp_depth: 0 #*mtp_depth
    num_layers: *num_layers
    micro_batch_num: *micro_batch_num

processor:
  return_tensors: ms
  tokenizer:
    model_max_length: 32768
    vocab_file: "path/vocab.json" # can set in run_command --vocab_file
    merges_file: "path/merges.txt" # can set in run_command --merges_file
    unk_token: "<|endoftext|>"
    eos_token: "<|endoftext|>"
    pad_token: "<|endoftext|>"
    type: Qwen2Tokenizer
  type: Qwen2Processor


profile: False 
profile_start_step: 5    # modify, 1
profile_stop_step: 5
init_start_profile: False
profile_communication: False
profile_memory: True

