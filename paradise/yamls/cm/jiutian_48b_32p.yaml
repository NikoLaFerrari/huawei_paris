  data_loader:
    type: MultiSourceDataLoader
    data_source_type: 'random_access'
    dataset_dir: "/job/data/"
    load_indices_npz_path: '/job/output/jiutian_230B_6T0429v1_6T_4K_0506_fix.npz'
