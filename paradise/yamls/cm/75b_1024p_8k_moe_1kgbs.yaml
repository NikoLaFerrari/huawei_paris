# llama2-70b model training configuration on Atlas 800T A2 with auto parallel mode.

# It is suggested to use this configuration file for MindSpore r2.2 and versions later than r2.2.
# For MindSpore r2.1 and versions earlier than r2.1, please use the configuration file without "auto_parallel" suffix.

seed: 0
output_dir: '/job/output/' # path to save checkpoint/strategy
#load_checkpoint: '/job/output/dst_checkpoint'
#load_checkpoint: '/job/resume_ckpt' 
load_checkpoint: '' #'/job/output/checkpoint' #'/job/load_checkpoint/' #'/job/output/checkpoint_network' #'/job/output/checkpoint' 
src_strategy_path_or_dir: ''
auto_trans_ckpt: False  # If true, auto transform load_checkpoint to load in distributed model
only_save_strategy: False
resume_training: False
#resume_by_last_timestamp_ckpt: True
run_mode: 'train'
#train_precision_sync: 1

# trainer config
trainer:
  type: CausalLanguageModelingTrainer
  model_name: 'llama2_70b'
# if True, do evaluate during the training process. if false, do nothing.
# note that the task trainer should support _evaluate_in_training function.
do_eval: False
eval_step_interval: -1        # num of step intervals between each eval, -1 means no step end eval.
eval_epoch_interval: 50        # num of epoch intervals between each eval, 1 means eval on every epoch end.

# runner config
runner_config:
  epochs: 1
  batch_size: 1
  # global batch size for devices in a single stage under auto parallel.
  # If pipeline is enabled, the global batch size is batch_size * micro batch.
  sink_mode: True
  sink_size: 1
  gradient_accumulation_steps: 1
  #append_skip_steps: 13050
# append_skip_steps: 0 # 500
# optimizer
optimizer:
  type: AdamW #FP32StateAdamWeightDecay
  betas: [0.9, 0.95]
  eps: 1.e-8 # 1e-8
  learning_rate: 5.e-6 #1.e-5 #1.6e-5 #2.e-5 #1.e-5  
  weight_decay: 0.1

# lr sechdule
lr_schedule:
  type: CosineWithWarmUpLR
  learning_rate: 5.e-6 #1.e-5 #1.6e-5 #2.e-5    #1.e-5
  lr_end: 1.e-6 #0
  #warmup_ratio: 0.03
  warmup_steps: 2000 #2000 300
  total_steps: -1 # -1 means it will load the total steps of the dataset

# dataset
train_dataset: &train_dataset
  data_loader:
    type: MultiSourceDataLoader
    data_source_type: 'random_access'
    dataset_dir: "/job/data/"
    load_indices_npz_path: '/job/output/dataset_deepseekv3_new_data_1.3T_0513.npz'
    #save_indices_npz_path: '/job/output/dataset_deepseekv3_new_data_1.3T_0320.npz'
