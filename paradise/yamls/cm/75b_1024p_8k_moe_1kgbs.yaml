train_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *train_dataset

# eval dataset
eval_dataset: &eval_dataset
  data_loader:
    type: MindDataset
    dataset_dir: ""
    shuffle: False
  input_columns: ["input_ids"]
  num_parallel_workers: 8
  python_multiprocessing: False
  drop_remainder: False
  repeat: 1
  numa_enable: False
  prefetch_size: 1
eval_dataset_task:
  type: CausalLanguageModelDataset
  dataset_config: *eval_dataset

use_parallel: True
# parallel context config
parallel_config:
  data_parallel: 8    # 512 #7 #15 #d
  model_parallel: 8 #16 #8
  pipeline_stage: 16 #16 #8
  expert_parallel: 8 #8
  use_seq_parallel: True
  micro_batch_num: 64 #64 #4 #8 #4 #16
  vocab_emb_dp: True
  gradient_aggregation_group: 4 #8 
# when model parallel is greater than 1, we can set micro_batch_interleave_num=2, that may accelerate the train process.
micro_batch_interleave_num: 1 #2

parallel:
  parallel_mode: 1 # 0-data parallel, 1-semi-auto parallel, 2-auto parallel, 3-hybrid parallel
  gradients_mean: False
  enable_alltoall: True
  # use for debug
  #dump_local_norm: True
  dump_device_local_norm: True
  #full_batch: True
  full_batch: False    # modify, True
  dataset_strategy: [[8, 1]]    # add, =dp
  search_mode: "sharding_propagation"
  enable_parallel_optimizer: False #True
  strategy_ckpt_config:
    save_file: "./ckpt_strategy.ckpt"
    only_trainable_params: False
  #strategy_ckpt_save_file: "./ckpt_strategy.ckpt"
  parallel_optimizer_config:
    gradient_accumulation_shard: False
    parallel_optimizer_threshold: 64
    optimizer_weight_shard_size: 2    # add
# default parallel of device num = 32 for Atlas 800T A2
