auto_trans_ckpt: false
auto_tune: false
autotune_per_step: 10
callbacks:
- type: MFLossMonitor
- async_save: false
  integrated_save: false
  prefix: llama2_7b
  save_checkpoint_steps: 100
  type: CheckpointMonitor
- type: ObsMonitor
context:
  device_id: 0
  device_target: Ascend
  max_call_depth: 10000
  max_device_memory: 58GB
  mode: 0
  save_graphs: false
  save_graphs_path: ./output/graph
do_eval: false
eval_callbacks:
- type: ObsMonitor
eval_dataset:
  data_loader:
    dataset_dir: '/data3/s50047805/dataset/llama2/'
    shuffle: false
    type: MindDataset
  drop_remainder: false
  input_columns: &id001
  - input_ids
  num_parallel_workers: 8
  numa_enable: false
  prefetch_size: 1
  python_multiprocessing: false
  repeat: 1
eval_dataset_task:
  dataset_config:
    data_loader:
      dataset_dir: '/data3/s50047805/dataset/llama2/'
      shuffle: false
      type: MindDataset
    drop_remainder: false
    input_columns: *id001
    num_parallel_workers: 8
    numa_enable: false
    prefetch_size: 1
    python_multiprocessing: false
    repeat: 1
  type: CausalLanguageModelDataset
filepath_prefix: ./autotune
init_start_profile: false
layer_decay: 0.65
layer_scale: false
load_checkpoint: ''
lr_scale_factor: 256
lr_schedule:
  learning_rate: 5.0e-05
  lr_end: 0
  total_steps: -1
  type: CosineWithWarmUpLR
  warmup_ratio: 0.03
metric:
  type: PerplexityMetric
micro_batch_interleave_num: 1
model:
  arch:
    type: LlamaForCausalLM
  model_config:
    batch_size: 1
    bos_token_id: 1
    checkpoint_name_or_path: llama2_7b
    compute_dtype: float16
    do_sample: false
    eos_token_id: 2
    extend_method: None
    hidden_size: 4096
    ignore_token_id: -100
    layernorm_compute_type: float32
    max_decode_length: 512
    multiple_of: 256
    num_heads: 64 # 32
    num_layers: 32
    offset: 0
    pad_token_id: 0
    param_init_type: float16
    repetition_penalty: 1
    rms_norm_eps: 1.0e-05
    rotary_dtype: float16
    scaling_factor: 1.0
    seq_length: 4096
    softmax_compute_type: float16
    top_k: 3
    top_p: 1
    type: LlamaConfig
    use_flash_attention: true
    use_past: false
    vocab_size: 32000
only_save_strategy: false
optimizer:
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-08
  learning_rate: 5.0e-05
  type: FP32StateAdamWeightDecay
output_dir: ./output/
parallel:
  enable_alltoall: false
  enable_parallel_optimizer: true
  full_batch: true
  gradients_mean: false
  parallel_mode: 1
  parallel_optimizer_config:
    gradient_accumulation_shard: false
    parallel_optimizer_threshold: 64
  search_mode: sharding_propagation
  strategy_ckpt_save_file: ./ckpt_strategy.ckpt
parallel_config:
  data_parallel: 32
  gradient_aggregation_group: 4
  micro_batch_num: 16
  model_parallel: 2
  pipeline_stage: 1
  use_seq_parallel: false
  vocab_emb_dp: true
processor:
  return_tensors: ms
  tokenizer:
    bos_token: <s>
    eos_token: </s>
    pad_token: <unk>
    type: LlamaTokenizer
    unk_token: <unk>
  type: LlamaProcessor
profile: true
profile_communication: false
profile_memory: true
profile_start_step: 9
profile_stop_step: 10
recompute_config:
  mp_comm_recompute: true
  parallel_optimizer_comm_recompute: false
  recompute: false
  recompute_slice_activation: true
  select_recompute: false
remote_save_url: Please input obs url on AICC platform.
resume_training: false
run_mode: train
runner_config:
  batch_size: 1
  epochs: 2
  gradient_accumulation_steps: 1
  sink_mode: true
  sink_size: 2
runner_wrapper:
  scale_sense:
    loss_scale_value: 65536
    scale_factor: 2
    scale_window: 1000
    type: DynamicLossScaleUpdateCell
  type: MFTrainOneStepCell
  use_clip_grad: true
seed: 0
src_strategy_path_or_dir: ''
train_dataset:
  batch_size: 6
  data_loader:
    dataset_dir: '/data3/s50047805/dataset/llama2/'
    shuffle: true
    type: MindDataset
  drop_remainder: true
  input_columns: &id002
  - input_ids
  num_parallel_workers: 8
  numa_enable: false
  prefetch_size: 1
  python_multiprocessing: false
  repeat: 1
train_dataset_task:
  dataset_config:
    batch_size: 6
    data_loader:
      dataset_dir: '/data3/s50047805/dataset/llama2/'
      shuffle: true
      type: MindDataset
    drop_remainder: true
    input_columns: *id002
    num_parallel_workers: 8
    numa_enable: false
    prefetch_size: 1
    python_multiprocessing: false
    repeat: 1
  type: CausalLanguageModelDataset
trainer:
  model_name: llama2_7b
  type: CausalLanguageModelingTrainer
use_parallel: true

